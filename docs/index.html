<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSUT IT Attendance Portal — Login</title>
  <meta name="description" content="NSUT IT Branch Attendance Management System — Student and Teacher login portal">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { font-family: 'Inter', sans-serif; }

    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated background orbs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }
    body::before {
      width: 400px; height: 400px;
      background: #667eea;
      top: -100px; left: -100px;
    }
    body::after {
      width: 350px; height: 350px;
      background: #764ba2;
      bottom: -80px; right: -80px;
      animation-delay: -4s;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-30px) scale(1.05); }
    }

    .login-wrapper {
      width: 100%;
      max-width: 460px;
      padding: 20px;
      position: relative;
      z-index: 10;
    }

    .login-card {
      border: none;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 35px 30px;
      text-align: center;
      border: none;
    }
    .card-header .logo-icon {
      width: 70px; height: 70px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 15px;
      font-size: 28px; color: #fff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .card-header h3 { color: #fff; font-weight: 700; margin: 0; font-size: 1.4rem; }
    .card-header p  { color: rgba(255,255,255,0.8); margin: 6px 0 0; font-size: 0.9rem; }

    .card-body { padding: 35px 30px; }

    /* Role toggle */
    .role-toggle .btn-check + label {
      border: 1.5px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      background: transparent;
      border-radius: 10px;
      padding: 10px 20px;
      font-weight: 500;
      transition: all 0.25s;
    }
    .role-toggle .btn-check:checked + label {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 15px rgba(102,126,234,0.4);
    }

    .form-label { color: rgba(255,255,255,0.75); font-size: 0.85rem; font-weight: 500; margin-bottom: 6px; }

    .input-group-text {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-right: none;
      color: #667eea;
    }
    .form-control {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-left: none;
      color: #fff;
    }
    .form-control::placeholder { color: rgba(255,255,255,0.35); }
    .form-control:focus {
      background: rgba(255,255,255,0.12);
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.25);
      color: #fff;
    }

    .btn-login {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none; color: #fff;
      padding: 12px; font-weight: 600; font-size: 1rem;
      border-radius: 12px;
      transition: all 0.3s;
      letter-spacing: 0.5px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102,126,234,0.5);
      color: #fff;
    }
    .btn-login:active { transform: translateY(0); }

    .demo-box {
      background: rgba(102,126,234,0.15);
      border: 1px solid rgba(102,126,234,0.3);
      border-radius: 12px;
      padding: 14px 16px;
      color: rgba(255,255,255,0.8);
      font-size: 0.82rem;
    }
    .demo-box strong { color: #a0b4ff; }

    .badge-sql {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff; font-size: 0.7rem; padding: 3px 8px; border-radius: 20px;
      font-weight: 600; letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <!-- SQL badge -->
    <div class="text-center mb-3">
      <span class="badge-sql"><i class="fas fa-database me-1"></i>DBMS Project Demo</span>
    </div>

    <div class="card login-card">
      <div class="card-header">
        <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
        <h3>NSUT IT Branch</h3>
        <p>Attendance Management Portal</p>
      </div>

      <div class="card-body">
        <!-- Role selector -->
        <div class="mb-4">
          <div class="btn-group w-100 role-toggle" role="group">
            <input type="radio" class="btn-check" name="userType" id="studentRadio" value="student" checked>
            <label class="btn w-50" for="studentRadio">
              <i class="fas fa-user-graduate me-2"></i>Student
            </label>
            <input type="radio" class="btn-check" name="userType" id="teacherRadio" value="teacher">
            <label class="btn w-50" for="teacherRadio">
              <i class="fas fa-chalkboard-teacher me-2"></i>Teacher
            </label>
          </div>
        </div>

        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-envelope"></i></span>
              <input type="email" class="form-control" id="email" required placeholder="Enter your email">
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock"></i></span>
              <input type="password" class="form-control" id="password" required placeholder="Enter your password">
            </div>
          </div>

          <!-- Demo credentials box -->
          <div class="demo-box mb-4" id="demoBox">
            <div class="mb-1"><strong>Demo Credentials — Student</strong></div>
            <div id="demoCredentials">
              <i class="fas fa-user me-1"></i>aarav.sharma@nsut.ac.in / pass001<br>
              <small class="opacity-75">Roll No: 2021IT001–2021IT020 | pass001–pass020</small>
            </div>
          </div>

          <div id="errorAlert" class="alert alert-danger d-none rounded-3 py-2" role="alert"></div>

          <button type="submit" class="btn btn-login w-100" id="loginBtn">
            <i class="fas fa-sign-in-alt me-2"></i>Login
          </button>
        </form>

        <div class="text-center mt-3">
          <small class="opacity-50" style="color:#fff;font-size:.75rem;">
            <i class="fas fa-database me-1"></i>SQL Demo: SELECT with WHERE + PDO prepared statements
          </small>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/db.js"></script>
  <script>
    // If already logged in, redirect
    const session = DB.getSession();
    if (session) {
      window.location.href = session.user_type === 'teacher' ? 'teacher.html' : 'student.html';
    }

    // Update demo credentials on role change
    document.querySelectorAll('input[name="userType"]').forEach(radio => {
      radio.addEventListener('change', function () {
        const isTeacher = this.value === 'teacher';
        document.getElementById('demoCredentials').innerHTML = isTeacher
          ? `<i class="fas fa-chalkboard-teacher me-1"></i>rajesh.kumar@nsut.ac.in / teacher001<br>
             <small class="opacity-75">5 teacher accounts: teacher001–teacher005</small>`
          : `<i class="fas fa-user me-1"></i>aarav.sharma@nsut.ac.in / pass001<br>
             <small class="opacity-75">Roll No: 2021IT001–2021IT020 | pass001–pass020</small>`;
        document.querySelector('.demo-box strong').textContent =
          'Demo Credentials — ' + (isTeacher ? 'Teacher' : 'Student');
      });
    });

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const userType = document.querySelector('input[name="userType"]:checked').value;
      const errorEl  = document.getElementById('errorAlert');
      const btn      = document.getElementById('loginBtn');

      errorEl.classList.add('d-none');
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in…';
      btn.disabled = true;

      // Simulate network delay
      setTimeout(() => {
        // SQL DEMO: SELECT WHERE — authenticate user
        const user = userType === 'student'
          ? DB.loginStudent(email, password)
          : DB.loginTeacher(email, password);

        if (user) {
          const sessionData = {
            user_id:   userType === 'student' ? user.student_id : user.teacher_id,
            user_name: user.name,
            user_email: user.email,
            user_type:  userType,
            roll_number: user.roll_number || null,
          };
          DB.setSession(sessionData);
          window.location.href = userType === 'teacher' ? 'teacher.html' : 'student.html';
        } else {
          errorEl.textContent = 'Invalid email or password. Please try again.';
          errorEl.classList.remove('d-none');
          btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Login';
          btn.disabled = false;
        }
      }, 600);
    });
  </script>
</body>
</html>
